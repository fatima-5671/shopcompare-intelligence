version: "3.9"

# ============================================================
# Cross-Platform E-Commerce Data Pipeline
# Docker Compose — Full Stack
# Services: Airflow (webserver + scheduler + worker),
#           PostgreSQL (Airflow metadata + pipeline data),
#           Redis (Celery broker), n8n (alerts), Streamlit (dashboard)
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    &airflow-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      undetected-chromedriver==3.5.5
      selenium==4.21.0
      beautifulsoup4==4.12.3
      requests==2.31.0
      pandas==2.2.2
      numpy==1.26.4
      rapidfuzz==3.9.3
      plotly==5.22.0
  volumes:
    - ./airflow_dags:/opt/airflow/dags
    - ./scrapers:/opt/airflow/project/scrapers
    - ./etl:/opt/airflow/project/etl
    - ./data:/opt/airflow/project/data
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-depends
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: pipeline_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    ports:
      - "5432:5432"

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pipeline_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always
    ports:
      - "6379:6379"

  # ── Airflow Init ────────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins
        airflow db init
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
        echo "Airflow initialized."
    restart: "no"

  # ── Airflow Webserver ───────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-depends
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Scheduler ───────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    restart: always
    depends_on:
      <<: *airflow-depends
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Worker ──────────────────────────────────────────────────────────
  airflow-worker:
    <<: *airflow-common
    container_name: airflow_worker
    command: celery worker
    environment:
      <<: *airflow-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-depends
      airflow-init:
        condition: service_completed_successfully

  # ── n8n Workflow Engine (Alerts) ────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: pipeline_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://n8n:5678/
    volumes:
      - n8n-data:/home/node/.n8n
    restart: always

  # ── Streamlit Dashboard ─────────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    container_name: pipeline_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app/dashboard
      - ./data:/app/data
    restart: always
    depends_on:
      - postgres

volumes:
  postgres-db:
  airflow-logs:
  airflow-plugins:
  n8n-data:
